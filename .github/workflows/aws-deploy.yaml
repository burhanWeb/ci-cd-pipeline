name: "CICD Nodejs Application"

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - "README.md"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Login to Docker Hub

      - name : DockerHub Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOKCERHUB_USERNAME}}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}  
      # Build Docker image

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOKCERHUB_USERNAME }}/nodejs-app:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOKCERHUB_USERNAME }}/nodejs-app:latest

  deploy-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST}}
          username: ${{ secrets.EC2_USER}}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY}}
          script: |
            docker pull ${{ secrets.DOKCERHUB_USERNAME }}/nodejs-app:latest
            docker stop nodejs-app || true
            docker rm nodejs-app || true
            docker run -d --restart unless-stopped --name nodejs-app -p 3000:3000 ${{ secrets.DOKCERHUB_USERNAME }}/nodejs-app:latest
